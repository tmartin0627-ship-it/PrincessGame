<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess & Unicorn Memory Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 25%, #e8eaf6 50%, #e0f7fa 75%, #fff9c4 100%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: #ad1457;
    text-shadow: 2px 2px 4px rgba(173, 20, 87, 0.15);
    margin-bottom: 10px;
    text-align: center;
  }

  .subtitle {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: #7b1fa2;
    margin-bottom: 20px;
  }

  .levels {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .levels button {
    padding: 12px 28px;
    border: 3px solid #42a5f5;
    border-radius: 50px;
    background: white;
    color: #1565c0;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .levels button:hover {
    background: #e3f2fd;
    transform: scale(1.05);
  }

  .levels button.active {
    background: linear-gradient(135deg, #42a5f5, #ab47bc);
    color: white;
    border-color: #1976d2;
    box-shadow: 0 4px 15px rgba(66, 165, 245, 0.4);
  }

  .difficulty {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .difficulty button {
    padding: 10px 24px;
    border: 3px solid #ce93d8;
    border-radius: 50px;
    background: white;
    color: #7b1fa2;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .difficulty button:hover {
    background: #f3e5f5;
    transform: scale(1.05);
  }

  .difficulty button.active {
    background: linear-gradient(135deg, #ce93d8, #f48fb1);
    color: white;
    border-color: #ab47bc;
    box-shadow: 0 4px 15px rgba(171, 71, 188, 0.4);
  }

  .grid {
    display: grid;
    gap: 14px;
    perspective: 1000px;
    justify-content: center;
  }

  .grid.cols-3 {
    grid-template-columns: repeat(3, min(28vw, 150px));
    grid-auto-rows: min(37.33vw, 200px);
  }
  .grid.cols-4 {
    grid-template-columns: repeat(4, min(22vw, 130px));
    grid-auto-rows: min(29.33vw, 173px);
  }
  .grid.cols-5 {
    grid-template-columns: repeat(5, min(18vw, 115px));
    grid-auto-rows: min(24vw, 153px);
  }
  .grid.cols-6 {
    grid-template-columns: repeat(6, min(15vw, 100px));
    grid-auto-rows: min(20vw, 133px);
  }

  .card {
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
    width: 100%;
    height: 100%;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card.matched {
    transform: rotateY(180deg);
    animation: matchBounce 0.5s ease;
  }

  @keyframes matchBounce {
    0%, 100% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.1); }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .card-back {
    background: linear-gradient(135deg, #e91e90, #9c27b0);
    border: 4px solid #f8bbd0;
    overflow: hidden;
  }

  .card-back::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 3px dashed rgba(255,255,255,0.4);
    border-radius: 10px;
  }

  .card-back-icon {
    font-size: clamp(2rem, 6vw, 3rem);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  .card-front {
    background: white;
    border: 4px solid #f8bbd0;
    transform: rotateY(180deg);
    padding: 10px;
  }

  .card-front svg {
    width: 100%;
    height: 100%;
  }

  .card-label {
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: clamp(0.6rem, 1.8vw, 0.8rem);
    font-weight: 600;
    color: #ad1457;
  }

  .word-text {
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  }

  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkleAnim 0.7s ease-out forwards;
  }

  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
  }

  /* Win overlay */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.5s ease;
  }

  .win-overlay.show { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .win-text {
    font-size: clamp(2rem, 8vw, 4rem);
    color: #ad1457;
    margin-bottom: 10px;
    animation: winBounce 1s ease infinite;
  }

  .win-emoji {
    font-size: clamp(3rem, 10vw, 5rem);
    margin-bottom: 20px;
  }

  @keyframes winBounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .play-again {
    padding: 16px 48px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ec407a, #ab47bc);
    color: white;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(233, 30, 99, 0.4);
    transition: transform 0.2s;
  }

  .play-again:hover { transform: scale(1.08); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    top: -20px;
    z-index: 101;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Matched sparkle ring */
  .match-ring {
    position: absolute;
    inset: -10px;
    border: 4px solid #ffd54f;
    border-radius: 20px;
    animation: ringPulse 0.6s ease-out forwards;
    pointer-events: none;
  }

  @keyframes ringPulse {
    0% { transform: scale(0.8); opacity: 1; border-color: #ffd54f; }
    100% { transform: scale(1.15); opacity: 0; border-color: #ff80ab; }
  }
</style>
</head>
<body>

<h1>Princess & Unicorn Memory</h1>
<p class="subtitle">Find all the matching pairs!</p>

<div class="levels">
  <button data-lvl="1" class="active" onclick="setLevel(1)">Pictures</button>
  <button data-lvl="2" onclick="setLevel(2)">Words</button>
  <button data-lvl="3" onclick="setLevel(3)">Numbers</button>
</div>

<div class="difficulty">
  <button data-level="easy" onclick="setDifficulty('easy')">Easy</button>
  <button data-level="medium" class="active" onclick="setDifficulty('medium')">Medium</button>
  <button data-level="hard" onclick="setDifficulty('hard')">Hard</button>
</div>

<div class="grid cols-3" id="grid"></div>

<div class="win-overlay" id="winOverlay">
  <div class="win-emoji">&#x1F389;</div>
  <div class="win-text">You did it!</div>
  <p class="subtitle" style="margin-bottom:24px">All pairs found!</p>
  <button class="play-again" onclick="startGame()">Play Again</button>
</div>

// ─── Word Data for Level 2 ──────────────────────────────────────
const words = [
  { name: 'PAPA',  color: '#e91e63', bg: '#fce4ec' },
  { name: 'MAMA',  color: '#9c27b0', bg: '#f3e5f5' },
  { name: 'MAYA',  color: '#2196f3', bg: '#e3f2fd' },
  { name: 'LEYLA', color: '#e65100', bg: '#fff3e0' },
  { name: 'PAATI', color: '#00897b', bg: '#e0f2f1' },
  { name: 'TATA',  color: '#5e35b1', bg: '#ede7f6' },
  { name: 'OMA',   color: '#c62828', bg: '#ffebee' },
  { name: 'OPA',   color: '#1565c0', bg: '#e3f2fd' },
  { name: 'KAYA',  color: '#ad1457', bg: '#fce4ec' }
];

// ─── Number Data for Level 3 ────────────────────────────────────
const numbers = [
  { name: '0',  color: '#e91e63', bg: '#fce4ec' },
  { name: '1',  color: '#9c27b0', bg: '#f3e5f5' },
  { name: '2',  color: '#2196f3', bg: '#e3f2fd' },
  { name: '3',  color: '#ff9800', bg: '#fff3e0' },
  { name: '4',  color: '#00897b', bg: '#e0f2f1' },
  { name: '5',  color: '#5e35b1', bg: '#ede7f6' },
  { name: '6',  color: '#c62828', bg: '#ffebee' },
  { name: '7',  color: '#1565c0', bg: '#e3f2fd' },
  { name: '8',  color: '#ad1457', bg: '#fce4ec' },
  { name: '9',  color: '#00695c', bg: '#e0f2f1' },
  { name: '10', color: '#4527a0', bg: '#ede7f6' }
];

// ─── Game State ─────────────────────────────────────────────────
const difficultyConfig = {
  1: { easy: { pairs: 3, cols: 3 }, medium: { pairs: 6, cols: 4 }, hard: { pairs: 8, cols: 4 } },
  2: { easy: { pairs: 3, cols: 3 }, medium: { pairs: 6, cols: 4 }, hard: { pairs: 9, cols: 6 } },
  3: { easy: { pairs: 3, cols: 3 }, medium: { pairs: 6, cols: 4 }, hard: { pairs: 10, cols: 5 } }
};

let currentLevel = 1;
let currentDifficulty = 'medium';
let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let totalPairs = 0;
let locked = false;

// ─── Level ──────────────────────────────────────────────────────
function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.levels button').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.lvl) === level);
  });
  startGame();
}

// ─── Difficulty ─────────────────────────────────────────────────
function setDifficulty(level) {
  currentDifficulty = level;
  document.querySelectorAll('.difficulty button').forEach(b => {
    b.classList.toggle('active', b.dataset.level === level);
  });
  startGame();
}

// ─── Shuffle ────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ─── Create Sparkles ────────────────────────────────────────────
function createSparkles(card) {
  const colors = ['#ffd54f', '#f48fb1', '#ce93d8', '#80deea', '#c5e1a5'];
  for (let i = 0; i < 6; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      width: 12px; height: 12px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: 50%;
    `;
    card.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 700);
  }

  const ring = document.createElement('div');
  ring.className = 'match-ring';
  card.appendChild(ring);
  setTimeout(() => ring.remove(), 600);
}

// ─── Confetti ───────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#e91e63', '#9c27b0', '#ffd54f', '#4caf50', '#42a5f5', '#ff9800', '#f48fb1', '#ce93d8'];
  const shapes = ['&#9733;', '&#x2665;', '&#9679;', '&#9830;'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.innerHTML = shapes[Math.floor(Math.random() * shapes.length)];
    piece.style.cssText = `
      left: ${Math.random() * 100}vw;
      color: ${colors[Math.floor(Math.random() * colors.length)]};
      font-size: ${12 + Math.random() * 18}px;
      animation-duration: ${2 + Math.random() * 3}s;
      animation-delay: ${Math.random() * 1.5}s;
    `;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

// ─── Card Click ─────────────────────────────────────────────────
function flipCard(index) {
  if (locked) return;
  const card = cards[index];
  if (!card || card.flipped || card.matched) return;

  card.flipped = true;
  card.el.classList.add('flipped');
  flippedCards.push(index);

  if (flippedCards.length === 2) {
    locked = true;
    const [a, b] = flippedCards;

    if (cards[a].charIndex === cards[b].charIndex) {
      // Match!
      cards[a].matched = true;
      cards[b].matched = true;
      matchedPairs++;
      setTimeout(() => {
        cards[a].el.classList.add('matched');
        cards[b].el.classList.add('matched');
        createSparkles(cards[a].el);
        createSparkles(cards[b].el);
      }, 300);

      flippedCards = [];
      locked = false;

      if (matchedPairs === totalPairs) {
        setTimeout(() => {
          document.getElementById('winOverlay').classList.add('show');
          launchConfetti();
        }, 800);
      }
    } else {
      // No match — flip back
      setTimeout(() => {
        cards[a].flipped = false;
        cards[b].flipped = false;
        cards[a].el.classList.remove('flipped');
        cards[b].el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
      }, 900);
    }
  }
}

// ─── Start Game ─────────────────────────────────────────────────
function startGame() {
  const config = difficultyConfig[currentLevel][currentDifficulty];
  const { pairs, cols } = config;
  totalPairs = pairs;
  matchedPairs = 0;
  flippedCards = [];
  locked = false;
  cards = [];

  document.getElementById('winOverlay').classList.remove('show');

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = `grid cols-${cols}`;

  let deck;

  if (currentLevel === 1) {
    const selected = shuffle([...characters]).slice(0, pairs);
    deck = shuffle([...selected, ...selected].map((ch) => ({
      charIndex: characters.indexOf(ch),
      content: ch
    })));
  } else {
    const source = currentLevel === 2 ? words : numbers;
    const selected = shuffle([...source]).slice(0, pairs);
    deck = shuffle([...selected, ...selected].map((w) => ({
      charIndex: source.indexOf(w),
      content: w
    })));
  }

  deck.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => flipCard(i);

    let frontContent;
    if (currentLevel === 1) {
      frontContent = `
        ${item.content.svg}
        <div class="card-label">${item.content.name}</div>
      `;
    } else {
      const w = item.content;
      const fontSize = w.name.length <= 2 ? 'clamp(2rem, 6vw, 3rem)' :
                       w.name.length <= 3 ? 'clamp(1.6rem, 5vw, 2.4rem)' :
                       w.name.length <= 4 ? 'clamp(1.3rem, 4vw, 2rem)' :
                                            'clamp(1rem, 3.5vw, 1.6rem)';
      frontContent = `
        <div class="word-text" style="color:${w.color}; font-size:${fontSize}">${w.name}</div>
      `;
    }

    card.innerHTML = `
      <div class="card-face card-back">
        <span class="card-back-icon">&#x2728;</span>
      </div>
      <div class="card-face card-front" ${currentLevel === 2 ? `style="background:${item.content.bg}"` : ''}>
        ${frontContent}
      </div>
    `;

    grid.appendChild(card);
    cards.push({
      el: card,
      charIndex: item.charIndex,
      flipped: false,
      matched: false
    });
  });
}

// ─── Init ───────────────────────────────────────────────────────
startGame();
</script>
