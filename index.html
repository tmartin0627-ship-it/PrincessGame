<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Maya's Game">
<meta name="theme-color" content="#fce4ec">
<title>Maya's Game</title>
<style>
  :root {
    --pink: #e91e90;
    --pink-dark: #ad1457;
    --purple: #9c27b0;
    --purple-light: #ce93d8;
    --gold: #ffd54f;
    --blue: #42a5f5;
    --bg: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 25%, #e8eaf6 50%, #e0f7fa 75%, #fff9c4 100%);
    --flip-speed: 0.5s;
    --vh: 1vh;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }

  body {
    min-height: 100vh;
    min-height: calc(var(--vh, 1vh) * 100);
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  button, .card { touch-action: none; -webkit-touch-callout: none; cursor: pointer; }

  /* âââ Screens âââââââââââââââââââââââââââââââââââââââââââ */
  .screen {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .screen.hidden {
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    position: absolute;
    top: 0;
  }
  .screen.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* âââ Menu Screen âââââââââââââââââââââââââââââââââââââââ */
  .menu-title {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800;
    margin-bottom: 4px;
    text-align: center;
  }
  .menu-subtitle {
    font-size: clamp(0.85rem, 2.5vw, 1.05rem);
    color: var(--purple);
    margin-bottom: 24px;
  }
  .total-stars-bar {
    font-size: 1rem;
    color: var(--purple);
    font-weight: 600;
    margin-bottom: 20px;
  }
  .total-stars-bar .star-icon { color: var(--gold); }

  .level-cards {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
    margin-bottom: 24px;
  }

  .level-card {
    width: min(42vw, 200px);
    background: white;
    border-radius: 20px;
    padding: 16px 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-shadow: 0 6px 24px rgba(173,20,87,0.1);
    border: 3px solid #f8bbd0;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .level-card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(173,20,87,0.18); }
  .level-card:active { transform: scale(0.96); }

  .level-card-icon { font-size: clamp(2.5rem, 8vw, 3.5rem); line-height: 1; }
  .level-card-title { font-size: clamp(0.9rem, 2.5vw, 1.1rem); font-weight: 700; color: var(--pink-dark); }
  .level-card-stars { display: flex; gap: 2px; }

  .star-icon { font-size: 1.2rem; }
  .star-icon.earned { color: var(--gold); }
  .star-icon.empty { color: #e0e0e0; }

  .menu-settings-btn {
    padding: 10px 24px;
    border: 2px solid var(--purple-light);
    border-radius: 50px;
    background: white;
    color: var(--purple);
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .menu-settings-btn:hover { background: #f3e5f5; }
  .menu-settings-btn:active { transform: scale(0.95); }

  /* âââ Game Screen âââââââââââââââââââââââââââââââââââââââ */
  .game-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0;
    width: 100%;
    max-width: 650px;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(135deg, rgba(252,228,236,0.95), rgba(243,229,245,0.95));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 8px 4px;
    border-radius: 0 0 16px 16px;
    top: env(safe-area-inset-top);
  }
  .back-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--purple-light);
    background: white;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple);
    transition: all 0.2s;
  }
  .back-btn:hover { background: #f3e5f5; }
  .back-btn:active { transform: scale(0.9); }
  .game-title {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: var(--pink-dark);
    text-align: center;
    flex: 1;
  }
  .gear-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--purple-light);
    background: white;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .gear-btn:hover { background: #f3e5f5; }
  .gear-btn:active { transform: scale(0.9); }

  .difficulty {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
    position: sticky;
    top: 52px;
    z-index: 9;
    padding: 6px 0;
    background: linear-gradient(135deg, rgba(252,228,236,0.92), rgba(243,229,245,0.92));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 0 0 12px 12px;
    width: 100%;
    max-width: 650px;
  }
  .diff-btn {
    padding: 8px 20px;
    border: 3px solid var(--purple-light);
    border-radius: 50px;
    background: white;
    color: var(--purple);
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .diff-btn:hover { background: #f3e5f5; transform: scale(1.04); }
  .diff-btn:active { transform: scale(0.95); }
  .diff-btn.active {
    background: linear-gradient(135deg, var(--purple-light), #f48fb1);
    color: white;
    border-color: #ab47bc;
    box-shadow: 0 4px 14px rgba(171,71,188,0.35);
  }
  .diff-btn .diff-stars { display: flex; gap: 1px; }
  .diff-btn .diff-stars .star-icon { font-size: 0.7rem; }
  .diff-btn.active .diff-stars .star-icon.earned { color: white; }
  .diff-btn.active .diff-stars .star-icon.empty { color: rgba(255,255,255,0.4); }

  /* âââ HUD âââââââââââââââââââââââââââââââââââââââââââââââ */
  .game-hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 650px;
    padding: 6px 4px;
    margin-bottom: 10px;
  }
  .move-counter {
    font-size: 1rem;
    font-weight: 700;
    color: var(--purple);
    min-width: 90px;
  }
  .hint-btn {
    padding: 6px 16px;
    border-radius: 50px;
    border: 2px solid var(--gold);
    background: #fff9c4;
    font-size: 0.85rem;
    font-weight: 600;
    color: #f57f17;
    transition: all 0.2s;
  }
  .hint-btn:hover { background: var(--gold); color: white; }
  .hint-btn:active { transform: scale(0.93); }
  .hint-btn:not(:disabled) { animation: hintGlow 3s ease-in-out infinite; }
  @keyframes hintGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,213,79,0); }
    50% { box-shadow: 0 0 12px 3px rgba(255,213,79,0.35); }
  }
  .hint-btn:disabled { opacity: 0.35; cursor: not-allowed; background: #eee; border-color: #ccc; color: #999; animation: none; }

  /* âââ Grid & Cards ââââââââââââââââââââââââââââââââââââââ */
  .grid {
    display: grid;
    gap: 10px;
    perspective: 1000px;
    justify-content: center;
  }
  .grid.cols-3 {
    grid-template-columns: repeat(3, min(28vw, 140px));
    grid-auto-rows: min(37.33vw, 187px);
  }
  .grid.cols-4 {
    grid-template-columns: repeat(4, min(21vw, 125px));
    grid-auto-rows: min(28vw, 167px);
  }
  .grid.cols-5 {
    grid-template-columns: repeat(5, min(17vw, 105px));
    grid-auto-rows: min(22.67vw, 140px);
  }
  .grid.cols-6 {
    grid-template-columns: repeat(6, min(14.5vw, 95px));
    grid-auto-rows: min(19.33vw, 127px);
  }

  .card {
    position: relative;
    transform-style: preserve-3d;
    transition: transform var(--flip-speed) ease;
    width: 100%;
    height: 100%;
  }
  .card.dealing {
    opacity: 0;
    transform: scale(0.3) rotate(-12deg) translateY(50px);
  }
  .card.dealt {
    opacity: 1;
    transform: scale(1) rotate(0deg) translateY(0);
    transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched {
    transform: rotateY(180deg);
    animation: matchBounce 0.5s ease;
  }
  @keyframes matchBounce {
    0%,100% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.08); }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }
  .card-back {
    background: linear-gradient(135deg, #d81b60, #8e24aa, #e91e90, #7b1fa2, #d81b60, #8e24aa);
    background-size: 300% 300%;
    animation: cardColorShift 5s ease-in-out infinite;
    border: 3px solid #f8bbd0;
    overflow: hidden;
  }
  @keyframes cardColorShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 2px dashed rgba(255,255,255,0.35);
    border-radius: 9px;
  }
  .card-front {
    background: white;
    border: 3px solid #f8bbd0;
    transform: rotateY(180deg);
    padding: 8px;
  }
  .card-front svg { width: 100%; height: 100%; }
  .card-label {
    position: absolute;
    bottom: 5px;
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(0.55rem, 1.6vw, 0.75rem);
    font-weight: 600;
    color: var(--pink-dark);
  }
  .word-text {
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.08);
  }

  /* âââ Effects âââââââââââââââââââââââââââââââââââââââââââ */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkleAnim 0.7s ease-out forwards;
  }
  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
  }
  .match-ring {
    position: absolute;
    inset: -8px;
    border: 3px solid var(--gold);
    border-radius: 18px;
    animation: ringPulse 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ringPulse {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.12); opacity: 0; }
  }
  .confetti-piece {
    position: fixed;
    top: -20px;
    z-index: 301;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* âââ Win Overlay âââââââââââââââââââââââââââââââââââââââ */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
  }
  .win-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .win-emoji { font-size: clamp(3rem, 10vw, 4.5rem); margin-bottom: 8px; }
  .win-text {
    font-size: clamp(1.8rem, 7vw, 3rem);
    color: var(--pink-dark);
    margin-bottom: 6px;
    animation: winBounce 1s ease infinite;
  }
  @keyframes winBounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .win-moves {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--purple);
    margin-bottom: 4px;
  }
  .star-rating {
    display: flex;
    gap: 8px;
    margin: 12px 0 16px;
  }
  .star-rating .star {
    font-size: clamp(2rem, 7vw, 3rem);
    opacity: 0;
    transform: scale(0) rotate(-180deg);
  }
  .star-rating .star.reveal {
    animation: starReveal 0.5s ease forwards;
  }
  .star-rating .star.empty-star {
    filter: grayscale(1);
    opacity: 0.25;
  }
  @keyframes starReveal {
    0% { opacity: 0; transform: scale(0) rotate(-180deg); }
    60% { transform: scale(1.3) rotate(10deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .win-btn {
    padding: 14px 42px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ec407a, #ab47bc);
    color: white;
    font-size: 1.2rem;
    font-weight: 700;
    box-shadow: 0 5px 18px rgba(233,30,99,0.35);
    transition: transform 0.2s;
    margin: 4px;
  }
  .win-btn:hover { transform: scale(1.06); }
  .win-btn:active { transform: scale(0.95); }
  .win-btn.secondary {
    background: white;
    color: var(--purple);
    border: 2px solid var(--purple-light);
    box-shadow: none;
    font-size: 1rem;
    padding: 10px 32px;
  }

  /* âââ Settings Panel ââââââââââââââââââââââââââââââââââââ */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 400;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .settings-overlay.open { opacity: 1; pointer-events: auto; }
  .settings-panel {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.9);
    background: white;
    border-radius: 24px;
    padding: 28px 32px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.18);
    z-index: 401;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    min-width: 260px;
    text-align: center;
  }
  .settings-panel.open {
    opacity: 1; pointer-events: auto;
    transform: translate(-50%,-50%) scale(1);
  }
  .settings-panel h3 {
    font-size: 1.3rem;
    color: var(--pink-dark);
    margin-bottom: 20px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 1rem;
    color: #333;
  }
  .toggle { position: relative; width: 50px; height: 28px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #ccc;
    border-radius: 28px;
    transition: 0.3s;
    cursor: pointer;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle input:checked + .toggle-slider { background: #ec407a; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }
  .settings-btn-row { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .reset-btn {
    padding: 10px;
    border: 2px solid #ef5350;
    border-radius: 12px;
    background: white;
    color: #ef5350;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: #ffebee; }
  .reset-btn:active { transform: scale(0.95); }
  .close-btn {
    padding: 10px;
    border: 2px solid var(--purple-light);
    border-radius: 12px;
    background: white;
    color: var(--purple);
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .close-btn:hover { background: #f3e5f5; }
  .close-btn:active { transform: scale(0.95); }

  /* âââ Floating Background âââââââââââââââââââââââââââ */
  .bg-particles {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .bg-particle {
    position: absolute;
    opacity: 0;
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
    5% { opacity: var(--p-opacity, 0.18); }
    90% { opacity: var(--p-opacity, 0.18); }
    100% { transform: translateY(-10vh) translateX(var(--p-sway, 30px)) rotate(var(--p-rot, 360deg)); opacity: 0; }
  }
  .screen { position: relative; z-index: 1; }

  /* âââ Shimmer Title ââââââââââââââââââââââââââââââââ */
  .menu-title {
    background: linear-gradient(90deg, #ad1457, #9c27b0, #e91e90, #ff6f61, #ffd54f, #e91e90, #9c27b0, #ad1457);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: titleShimmer 6s ease-in-out infinite;
  }
  @keyframes titleShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* âââ Card Back Pattern ââââââââââââââââââââââââââââ */
  .card-back-pattern {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back-pattern svg { width: 70%; height: 70%; opacity: 0.35; }
  .card-back-shimmer { display: none; }

// SOUND ENGINE (Web Audio API)
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
const Sound = {
  ctx: null,
  enabled: true,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  play(freq, type, dur, vol = 0.2, delay = 0) {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start(t);
    osc.stop(t + dur + 0.05);
  },
  flip()      { this.play(800, 'sine', 0.07, 0.12); },
  match()     { this.play(523, 'triangle', 0.15, 0.2); this.play(659, 'triangle', 0.2, 0.2, 0.1); },
  mismatch()  { this.play(220, 'sine', 0.2, 0.1); this.play(210, 'sine', 0.2, 0.1); },
  win()       { [523,659,784,1047].forEach((f,i) => this.play(f, 'triangle', 0.3, 0.18, i*0.15)); },
  click()     { this.play(600, 'sine', 0.04, 0.08); },
  hint()      { this.play(1200,'sine',0.08,0.12); this.play(900,'sine',0.08,0.12,0.07); this.play(1100,'sine',0.12,0.08,0.14); },
  deal(i, n)  { this.play(400 + (i/n)*400, 'sine', 0.05, 0.06); }
};

// STORAGE (localStorage)
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
const Storage = {
  KEY: 'princess-memory-v1',
  SKEY: 'princess-memory-settings',
  getProgress() { try { return JSON.parse(localStorage.getItem(this.KEY)) || {}; } catch { return {}; } },
  getStars(lvl, diff) { return (this.getProgress()[`${lvl}-${diff}`] || {}).stars || 0; },
  saveStars(lvl, diff, stars) {
    const p = this.getProgress();
    const k = `${lvl}-${diff}`;
    if (stars > ((p[k]||{}).stars||0)) { p[k] = { stars }; localStorage.setItem(this.KEY, JSON.stringify(p)); }
  },
  bestForLevel(lvl) { return Math.max(this.getStars(lvl,'easy'), this.getStars(lvl,'medium'), this.getStars(lvl,'hard')); },
  totalStars() { return Object.values(this.getProgress()).reduce((s,v) => s + (v.stars||0), 0); },
  maxStars() { return 27; }, // 3 levels Ã 3 difficulties Ã 3 stars
  getSettings() { try { return JSON.parse(localStorage.getItem(this.SKEY)) || { sound: true }; } catch { return { sound: true }; } },
  saveSettings(s) { localStorage.setItem(this.SKEY, JSON.stringify(s)); },
  reset() { localStorage.removeItem(this.KEY); }
};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function calcStars(moves, pairs) {
  // 3â = near-perfect memory (at most 2 mistakes)
  // 2â = good (roughly 50% extra moves)
  // 1â = completed
  const perfect = pairs;  // perfect = every flip is a match
  if (moves <= perfect + 2) return 3;
  if (moves <= Math.ceil(perfect * 1.5) + 2) return 2;
  return 1;
}

function svgStar(filled, size) {
  const sz = size || 20;
  const fill = filled ? '#ffd54f' : '#e0e0e0';
  const stroke = filled ? '#f9a825' : '#bdbdbd';
  return `<span class="svg-star" style="width:${sz}px;height:${sz}px;display:inline-block"><svg viewBox="0 0 24 24" width="${sz}" height="${sz}"><defs><linearGradient id="sg${filled?1:0}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${filled?'#ffee58':fill}"/><stop offset="100%" stop-color="${fill}"/></linearGradient></defs><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9" fill="url(#sg${filled?1:0})" stroke="${stroke}" stroke-width="1.2" stroke-linejoin="round"/>${filled?'<polygon points="12,5 13.5,9.5 18,9.5 14.5,12.5 16,17 12,14" fill="rgba(255,255,255,0.3)"/>':''}</svg></span>`;
}
function renderStars(count, size) {
  const sz = size ? parseInt(size) || 20 : 20;
  let h = '';
  for (let i = 0; i < 3; i++) h += svgStar(i < count, sz);
  return h;
}

  document.getElementById('gameScreen').classList.replace('visible','hidden');

  document.getElementById('gameScreen').classList.replace('hidden','visible');

function updateMenuStars() {
  const total = Storage.totalStars();
  const max = Storage.maxStars();
  document.getElementById('totalStars').innerHTML = total > 0
    ? `${svgStar(true, 22)} ${total} / ${max} stars collected`
    : 'Collect stars by completing games!';
  for (let l = 1; l <= 3; l++) {
    document.getElementById(`menu-stars-${l}`).innerHTML = renderStars(Storage.bestForLevel(l));
  }
}

function updateDifficultyStars() {
  ['easy','medium','hard'].forEach(d => {
    const s = Storage.getStars(currentLevel, d);
    document.getElementById(`diff-stars-${d}`).innerHTML = s > 0 ? renderStars(s, 14) : '';
  });
}

function createSparkles(card) {
  const colors = ['#ffd54f','#f48fb1','#ce93d8','#80deea','#c5e1a5'];
  // Burst particles radiating outward
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2;
    const dist = 40 + Math.random() * 30;
    const bx = Math.cos(angle) * dist;
    const by = Math.sin(angle) * dist;
    const p = document.createElement('div');
    p.className = 'match-particle';
    const size = 4 + Math.random() * 6;
    const color = colors[i % 5];
    p.style.cssText = `left:50%;top:50%;width:${size}px;height:${size}px;background:${color};border-radius:50%;--bx:${bx}px;--by:${by}px;animation-delay:${Math.random()*0.1}s;margin-left:-${size/2}px;margin-top:-${size/2}px;`;
    card.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
  // Double ring pulse
  for (let r = 0; r < 2; r++) {
    const ring = document.createElement('div');
    ring.className = 'match-ring';
    ring.style.animationDelay = `${r * 0.15}s`;
    card.appendChild(ring);
    setTimeout(() => ring.remove(), 800);
  }
}

    (c) => `<svg width="14" height="14" viewBox="0 0 24 24"><polygon points="12,3 15,10 22,10 17,15 19,22 12,18 5,22 7,15 2,10 9,10" fill="${c}"/></svg>`,

    document.body.appendChild(p);

    document.body.appendChild(star);
    setTimeout(() => star.remove(), 3000);
  }
}

// HINT
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function useHint() {
  if (hintsRemaining <= 0 || locked) return;
  Sound.init(); Sound.hint();
  hintsRemaining--;
  updateHintBtn();
  locked = true;
  cards.forEach(c => { if (!c.matched) c.el.classList.add('flipped'); });
  setTimeout(() => {
    cards.forEach(c => {
      if (!c.matched) { c.flipped = false; c.el.classList.remove('flipped'); }
    });
    flippedCards = [];
    locked = false;
  }, 1500);
}

const hintSvg = '<svg viewBox="0 0 20 20" width="14" height="14" style="vertical-align:-2px;margin-right:2px"><path d="M10,2 C6.5,2 4,4.8 4,8 C4,10.5 5.5,12 7,13 L7,15 L13,15 L13,13 C14.5,12 16,10.5 16,8 C16,4.8 13.5,2 10,2Z" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/><rect x="7" y="15.5" width="6" height="2" rx="1" fill="#f9a825"/><line x1="10" y1="6" x2="10" y2="10" stroke="#f57f17" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="5" r="1" fill="#f57f17"/></svg>';
function updateHintBtn() {
  const btn = document.getElementById('hintBtn');
  btn.innerHTML = `${hintSvg} Hint (${hintsRemaining})`;
  btn.disabled = hintsRemaining <= 0;
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// CARD FLIP
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function flipCard(index) {
  if (locked) return;
  Sound.init();
  const card = cards[index];
  if (!card || card.flipped || card.matched) return;

  Sound.flip();
  card.flipped = true;
  card.el.classList.add('flipped');
  flippedCards.push(index);

  if (flippedCards.length === 2) {
    moveCount++;
    document.getElementById('moveCounter').textContent = `Moves: ${moveCount}`;
    locked = true;
    const [a, b] = flippedCards;

    if (cards[a].charIndex === cards[b].charIndex) {
      Sound.match();
      cards[a].matched = true;
      cards[b].matched = true;
      matchedPairs++;
      setTimeout(() => {
        cards[a].el.classList.add('matched');
        cards[b].el.classList.add('matched');
        createSparkles(cards[a].el);
        createSparkles(cards[b].el);
      }, 300);
      flippedCards = [];
      locked = false;

      if (matchedPairs === totalPairs) {
        setTimeout(() => {
          const stars = calcStars(moveCount, totalPairs);
          Storage.saveStars(currentLevel, currentDifficulty, stars);
          showWin(stars);
          Sound.win();
          launchConfetti();
        }, 700);
      }
    } else {
      Sound.mismatch();
      setTimeout(() => {
        cards[a].flipped = false;
        cards[b].flipped = false;
        cards[a].el.classList.remove('flipped');
        cards[b].el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
      }, 850);
    }
  }
}

// WIN SCREEN
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function showWin(stars) {
  const overlay = document.getElementById('winOverlay');
  overlay.classList.add('show');
  const winTitles3 = ['Amazing!', 'You did it!', 'Super star!', 'Wonderful!', 'Brilliant!'];
  const winTitles2 = ['Great job!', 'Well done!', 'You did it!', 'Awesome!'];
  const winTitles1 = ['You did it!', 'Good try!', 'Nice work!'];
  const titles = stars === 3 ? winTitles3 : stars === 2 ? winTitles2 : winTitles1;
  document.getElementById('winText').textContent = titles[Math.floor(Math.random() * titles.length)];
  const perfect = totalPairs;
  document.getElementById('winMoves').textContent = moveCount <= perfect
    ? `Perfect! ${moveCount} moves!`
    : `Done in ${moveCount} moves!`;
  const sr = document.getElementById('starRating');
  sr.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('span');
    s.className = `star ${i < stars ? 'reveal' : 'empty-star reveal'}`;
    s.innerHTML = svgStar(i < stars, 48);
    s.style.animationDelay = `${0.3 + i * 0.25}s`;
    sr.appendChild(s);
  }
  updateDifficultyStars();
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// START GAME
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function startGame() {
  Sound.init();
  const config = difficultyConfig[currentLevel][currentDifficulty];
  const { pairs, cols } = config;
  totalPairs = pairs;
  matchedPairs = 0;
  flippedCards = [];
  locked = true;
  cards = [];
  moveCount = 0;
  hintsRemaining = 3;
  document.getElementById('moveCounter').textContent = 'Moves: 0';
  updateHintBtn();
  document.getElementById('winOverlay').classList.remove('show');

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = `grid cols-${cols}`;

  let deck;
  if (currentLevel === 1) {
    const sel = shuffle([...characters]).slice(0, pairs);
    deck = shuffle([...sel, ...sel].map(ch => ({ charIndex: characters.indexOf(ch), content: ch })));
  } else {
    const source = currentLevel === 2 ? words : numbers;
    const sel = shuffle([...source]).slice(0, pairs);
    deck = shuffle([...sel, ...sel].map(w => ({ charIndex: source.indexOf(w), content: w })));
  }

  deck.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card dealing';
    card.onclick = () => flipCard(i);

    let front;
    if (currentLevel === 1) {
      front = `${item.content.svg}<div class="card-label">${item.content.name}</div>`;
    } else {
      const w = item.content;
      const fs = w.name.length <= 2 ? 'clamp(1.8rem,5vw,2.6rem)' :
                 w.name.length <= 3 ? 'clamp(1.4rem,4.5vw,2.2rem)' :
                 w.name.length <= 4 ? 'clamp(1.1rem,3.5vw,1.8rem)' :
                                      'clamp(0.9rem,3vw,1.4rem)';
      front = `<div class="word-text" style="color:${w.color};font-size:${fs}">${w.name}</div>`;
    }

    const bgStyle = currentLevel !== 1 ? `style="background:${item.content.bg}"` : '';
    card.innerHTML = `
      <div class="card-face card-back"><div class="card-back-pattern"><svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg"><polygon points="30,8 33,16 41,16 35,21 37,29 30,25 23,29 25,21 19,16 27,16" fill="rgba(255,255,255,0.5)"/><polygon points="30,2 32,6 36,6 33,9 34,13 30,10 26,13 27,9 24,6 28,6" fill="rgba(255,213,79,0.6)"/><polygon points="15,35 17,39 21,39 18,42 19,46 15,43 11,46 12,42 9,39 13,39" fill="rgba(255,255,255,0.3)"/><polygon points="45,35 47,39 51,39 48,42 49,46 45,43 41,46 42,42 39,39 43,39" fill="rgba(255,255,255,0.3)"/><path d="M20,60 L24,52 L27,56 L30,48 L33,56 L36,52 L40,60Z" fill="rgba(255,255,255,0.35)" stroke="rgba(255,213,79,0.4)" stroke-width="0.8"/><circle cx="15" cy="20" r="2" fill="rgba(255,255,255,0.25)"/><circle cx="45" cy="22" r="1.5" fill="rgba(255,255,255,0.2)"/><circle cx="12" cy="55" r="1.5" fill="rgba(255,255,255,0.2)"/><circle cx="48" cy="58" r="2" fill="rgba(255,255,255,0.2)"/><path d="M22,68 Q30,72 38,68" fill="rgba(255,213,79,0.2)" stroke="rgba(255,213,79,0.3)" stroke-width="0.8"/></svg></div><div class="card-back-shimmer"></div></div>
      <div class="card-face card-front" ${bgStyle}>${front}</div>
    `;

    grid.appendChild(card);
    cards.push({ el: card, charIndex: item.charIndex, flipped: false, matched: false });
  });

  // Deal animation
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      cards.forEach((c, i) => {
        setTimeout(() => {
          c.el.classList.remove('dealing');
          c.el.classList.add('dealt');
          Sound.deal(i, cards.length);
        }, i * 50);
      });
      setTimeout(() => {
        locked = false;
        cards.forEach(c => c.el.classList.remove('dealt'));
      }, cards.length * 50 + 400);
    });
  });
}

// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
// FLOATING BACKGROUND
// âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function initBgParticles() {
  const container = document.getElementById('bgParticles');
  const shapes = [
    (c) => `<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12,4 C12,4 4,10 4,15 C4,19 8,22 12,22 C16,22 20,19 20,15 C20,10 12,4 12,4Z" fill="${c}" transform="rotate(180 12 13)"/></svg>`,
    (c) => `<svg viewBox="0 0 24 24" width="100%" height="100%"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9" fill="${c}"/></svg>`,
    (c) => `<svg viewBox="0 0 24 24" width="100%" height="100%"><polygon points="12,3 15,10 22,10 17,15 19,22 12,18 5,22 7,15 2,10 9,10" fill="${c}"/></svg>`,
    (c) => `<svg viewBox="0 0 30 30" width="100%" height="100%"><polygon points="15,5 17,11 23,11 18,15 20,21 15,17 10,21 12,15 7,11 13,11" fill="${c}"/><circle cx="8" cy="8" r="2" fill="${c}" opacity="0.5"/><circle cx="22" cy="24" r="1.5" fill="${c}" opacity="0.5"/></svg>`,
    (c) => `<svg viewBox="0 0 30 24" width="100%" height="100%"><polygon points="8,20 10,8 13,14 15,4 17,14 20,8 22,20" fill="${c}"/><rect x="8" y="20" width="14" height="3" rx="1" fill="${c}"/></svg>`,
  ];
  const colors = ['#f48fb1','#ce93d8','#ffd54f','#90caf9','#80cbc4','#ffab91','#b39ddb'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'bg-particle';
    const size = 15 + Math.random() * 28;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const opacity = 0.12 + Math.random() * 0.14;
    const duration = 18 + Math.random() * 18;
    const sway = -40 + Math.random() * 80;
    const rot = Math.random() > 0.5 ? 360 : -360;
    p.innerHTML = shapes[Math.floor(Math.random() * shapes.length)](color);
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;--p-opacity:${opacity};--p-sway:${sway}px;--p-rot:${rot}deg;animation-duration:${duration}s;animation-delay:${-Math.random()*duration}s;`;
    container.appendChild(p);
  }
}

function setVH() { document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px'); }
window.addEventListener('resize', setVH);
setVH();
loadSettings();
updateMenuStars();
initBgParticles();

// Prevent single-finger scrolling (kids accidentally scroll when tapping cards)
document.addEventListener('touchmove', function(e) {
  if (e.touches.length === 1) e.preventDefault();
}, { passive: false });
