<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Maya's Game">
<meta name="theme-color" content="#fce4ec">
<title>Maya's Game</title>
<style>
  :root {
    --pink: #e91e90;
    --pink-dark: #ad1457;
    --purple: #9c27b0;
    --purple-light: #ce93d8;
    --gold: #ffd54f;
    --blue: #42a5f5;
    --bg: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 25%, #e8eaf6 50%, #e0f7fa 75%, #fff9c4 100%);
    --flip-speed: 0.5s;
    --vh: 1vh;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }

  body {
    min-height: 100vh;
    min-height: calc(var(--vh, 1vh) * 100);
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  button { touch-action: manipulation; -webkit-touch-callout: none; cursor: pointer; }
  .card { touch-action: none; -webkit-touch-callout: none; cursor: pointer; }

  /* ‚îÄ‚îÄ‚îÄ Screens ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .screen {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .screen.hidden {
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    position: absolute;
    top: 0;
  }
  .screen.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ‚îÄ‚îÄ‚îÄ Menu Screen ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .menu-title {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800;
    margin-bottom: 4px;
    text-align: center;
  }
  .menu-subtitle {
    font-size: clamp(0.85rem, 2.5vw, 1.05rem);
    color: var(--purple);
    margin-bottom: 24px;
  }
  .total-stars-bar {
    font-size: 1rem;
    color: var(--purple);
    font-weight: 600;
    margin-bottom: 20px;
  }
  .total-stars-bar .star-icon { color: var(--gold); }

  .level-cards {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
    margin-bottom: 24px;
  }

  .level-card {
    width: min(42vw, 200px);
    background: white;
    border-radius: 20px;
    padding: 16px 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-shadow: 0 6px 24px rgba(173,20,87,0.1);
    border: 3px solid #f8bbd0;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .level-card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(173,20,87,0.18); }
  .level-card:active { transform: scale(0.96); }

  .level-card-icon { font-size: clamp(2.5rem, 8vw, 3.5rem); line-height: 1; }
  .level-card-title { font-size: clamp(0.9rem, 2.5vw, 1.1rem); font-weight: 700; color: var(--pink-dark); }
  .level-card-stars { display: flex; gap: 2px; }

  .star-icon { font-size: 1.2rem; }
  .star-icon.earned { color: var(--gold); }
  .star-icon.empty { color: #e0e0e0; }

  .menu-settings-btn {
    padding: 10px 24px;
    border: 2px solid var(--purple-light);
    border-radius: 50px;
    background: white;
    color: var(--purple);
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .menu-settings-btn:hover { background: #f3e5f5; }
  .menu-settings-btn:active { transform: scale(0.95); }

  /* ‚îÄ‚îÄ‚îÄ Game Screen ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .game-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0;
    width: 100%;
    max-width: 650px;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(135deg, rgba(252,228,236,0.95), rgba(243,229,245,0.95));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 8px 4px;
    border-radius: 0 0 16px 16px;
    top: env(safe-area-inset-top);
  }
  .back-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--purple-light);
    background: white;
    font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple);
    transition: all 0.2s;
  }
  .back-btn:hover { background: #f3e5f5; }
  .back-btn:active { transform: scale(0.9); }
  .game-title {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: var(--pink-dark);
    text-align: center;
    flex: 1;
  }
  .gear-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--purple-light);
    background: white;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .gear-btn:hover { background: #f3e5f5; }
  .gear-btn:active { transform: scale(0.9); }

  .difficulty {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
    position: sticky;
    top: 52px;
    z-index: 9;
    padding: 6px 0;
    background: linear-gradient(135deg, rgba(252,228,236,0.92), rgba(243,229,245,0.92));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 0 0 12px 12px;
    width: 100%;
    max-width: 650px;
  }
  .diff-btn {
    padding: 8px 20px;
    border: 3px solid var(--purple-light);
    border-radius: 50px;
    background: white;
    color: var(--purple);
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .diff-btn:hover { background: #f3e5f5; transform: scale(1.04); }
  .diff-btn:active { transform: scale(0.95); }
  .diff-btn.active {
    background: linear-gradient(135deg, var(--purple-light), #f48fb1);
    color: white;
    border-color: #ab47bc;
    box-shadow: 0 4px 14px rgba(171,71,188,0.35);
  }
  .diff-btn .diff-stars { display: flex; gap: 1px; }
  .diff-btn .diff-stars .star-icon { font-size: 0.7rem; }
  .diff-btn.active .diff-stars .star-icon.earned { color: white; }
  .diff-btn.active .diff-stars .star-icon.empty { color: rgba(255,255,255,0.4); }

  /* ‚îÄ‚îÄ‚îÄ HUD ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .game-hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 650px;
    padding: 6px 4px;
    margin-bottom: 10px;
    position: sticky;
    top: 104px;
    z-index: 8;
    background: linear-gradient(135deg, rgba(252,228,236,0.92), rgba(243,229,245,0.92));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 0 0 10px 10px;
  }
  .move-counter {
    font-size: 1rem;
    font-weight: 700;
    color: var(--purple);
    min-width: 90px;
  }
  .hint-btn {
    padding: 6px 16px;
    border-radius: 50px;
    border: 2px solid var(--gold);
    background: #fff9c4;
    font-size: 0.85rem;
    font-weight: 600;
    color: #f57f17;
    transition: all 0.2s;
  }
  .hint-btn:hover { background: var(--gold); color: white; }
  .hint-btn:active { transform: scale(0.93); }
  .hint-btn:not(:disabled) { animation: hintGlow 3s ease-in-out infinite; }
  @keyframes hintGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,213,79,0); }
    50% { box-shadow: 0 0 12px 3px rgba(255,213,79,0.35); }
  }
  .hint-btn:disabled { opacity: 0.35; cursor: not-allowed; background: #eee; border-color: #ccc; color: #999; animation: none; }

  .scroll-btns { display: flex; gap: 4px; }
  .scroll-btn {
    width: 32px; height: 28px;
    border-radius: 8px;
    border: 2px solid var(--purple-light);
    background: white;
    color: var(--purple);
    font-size: 0.7rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .scroll-btn:active { transform: scale(0.9); background: #f3e5f5; }

  /* ‚îÄ‚îÄ‚îÄ Grid & Cards ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .grid {
    display: grid;
    gap: 10px;
    perspective: 1000px;
    justify-content: center;
  }
  .grid.cols-3 {
    grid-template-columns: repeat(3, min(28vw, 140px));
    grid-auto-rows: min(37.33vw, 187px);
  }
  .grid.cols-4 {
    grid-template-columns: repeat(4, min(21vw, 125px));
    grid-auto-rows: min(28vw, 167px);
  }
  .grid.cols-5 {
    grid-template-columns: repeat(5, min(17vw, 105px));
    grid-auto-rows: min(22.67vw, 140px);
  }
  .grid.cols-6 {
    grid-template-columns: repeat(6, min(14.5vw, 95px));
    grid-auto-rows: min(19.33vw, 127px);
  }

  .card {
    position: relative;
    transform-style: preserve-3d;
    transition: transform var(--flip-speed) ease;
    width: 100%;
    height: 100%;
  }
  .card.dealing {
    opacity: 0;
    transform: scale(0.3) rotate(-12deg) translateY(50px);
  }
  .card.dealt {
    opacity: 1;
    transform: scale(1) rotate(0deg) translateY(0);
    transition: opacity 0.35s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched {
    transform: rotateY(180deg);
    animation: matchBounce 0.5s ease;
  }
  @keyframes matchBounce {
    0%,100% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.08); }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }
  .card-back {
    background: var(--card-bg, linear-gradient(135deg, #d81b60, #8e24aa, #e91e90, #7b1fa2, #d81b60, #8e24aa));
    background-size: 300% 300%;
    animation: cardColorShift 5s ease-in-out infinite;
    border: 3px solid var(--card-border, #f8bbd0);
    overflow: hidden;
  }
  @keyframes cardColorShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 2px dashed rgba(255,255,255,0.35);
    border-radius: 9px;
  }
  .card-front {
    background: white;
    border: 3px solid #f8bbd0;
    transform: rotateY(180deg);
    padding: 8px;
  }
  .card-front svg { width: 100%; height: 100%; }
  .card-label {
    position: absolute;
    bottom: 5px;
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(0.55rem, 1.6vw, 0.75rem);
    font-weight: 600;
    color: var(--pink-dark);
  }
  .word-text {
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.08);
  }

  /* ‚îÄ‚îÄ‚îÄ Effects ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkleAnim 0.7s ease-out forwards;
  }
  @keyframes sparkleAnim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
  }
  .match-ring {
    position: absolute;
    inset: -8px;
    border: 3px solid var(--gold);
    border-radius: 18px;
    animation: ringPulse 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ringPulse {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(1.12); opacity: 0; }
  }
  .confetti-piece {
    position: fixed;
    top: -20px;
    z-index: 301;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ‚îÄ‚îÄ‚îÄ Win Overlay ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
  }
  .win-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .win-emoji { font-size: clamp(3rem, 10vw, 4.5rem); margin-bottom: 8px; }
  .win-text {
    font-size: clamp(1.8rem, 7vw, 3rem);
    color: var(--pink-dark);
    margin-bottom: 6px;
    animation: winBounce 1s ease infinite;
  }
  @keyframes winBounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .win-moves {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--purple);
    margin-bottom: 4px;
  }
  .star-rating {
    display: flex;
    gap: 8px;
    margin: 12px 0 16px;
  }
  .star-rating .star {
    font-size: clamp(2rem, 7vw, 3rem);
    opacity: 0;
    transform: scale(0) rotate(-180deg);
  }
  .star-rating .star.reveal {
    animation: starReveal 0.5s ease forwards;
  }
  .star-rating .star.empty-star {
    filter: grayscale(1);
    opacity: 0.25;
  }
  @keyframes starReveal {
    0% { opacity: 0; transform: scale(0) rotate(-180deg); }
    60% { transform: scale(1.3) rotate(10deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .win-btn {
    padding: 14px 42px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ec407a, #ab47bc);
    color: white;
    font-size: 1.2rem;
    font-weight: 700;
    box-shadow: 0 5px 18px rgba(233,30,99,0.35);
    transition: transform 0.2s;
    margin: 4px;
  }
  .win-btn:hover { transform: scale(1.06); }
  .win-btn:active { transform: scale(0.95); }
  .win-btn.secondary {
    background: white;
    color: var(--purple);
    border: 2px solid var(--purple-light);
    box-shadow: none;
    font-size: 1rem;
    padding: 10px 32px;
  }

  /* ‚îÄ‚îÄ‚îÄ Settings Panel ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 400;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .settings-overlay.open { opacity: 1; pointer-events: auto; }
  .settings-panel {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.9);
    background: white;
    border-radius: 24px;
    padding: 28px 32px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.18);
    z-index: 401;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    min-width: 260px;
    max-width: calc(100vw - 32px);
    text-align: center;
  }
  .settings-panel.open {
    opacity: 1; pointer-events: auto;
    transform: translate(-50%,-50%) scale(1);
  }
  .settings-panel h3 {
    font-size: 1.3rem;
    color: var(--pink-dark);
    margin-bottom: 20px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 1rem;
    color: #333;
  }
  .toggle { position: relative; width: 50px; height: 28px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #ccc;
    border-radius: 28px;
    transition: 0.3s;
    cursor: pointer;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle input:checked + .toggle-slider { background: #ec407a; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }
  .settings-btn-row { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .reset-btn {
    padding: 10px;
    border: 2px solid #ef5350;
    border-radius: 12px;
    background: white;
    color: #ef5350;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: #ffebee; }
  .reset-btn:active { transform: scale(0.95); }
  .close-btn {
    padding: 10px;
    border: 2px solid var(--purple-light);
    border-radius: 12px;
    background: white;
    color: var(--purple);
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .close-btn:hover { background: #f3e5f5; }
  .close-btn:active { transform: scale(0.95); }

  .setting-section-label {
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
    margin-top: 4px;
    font-weight: 700;
    color: var(--pink-dark);
    font-size: 0.9rem;
    justify-content: center;
  }
  .theme-picker {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 4px 0 8px;
    flex-wrap: wrap;
  }
  .theme-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    border: 3px solid #e0e0e0;
    border-radius: 14px;
    background: white;
    font-size: 0.85rem;
    font-weight: 600;
    color: #666;
    transition: all 0.2s;
    cursor: pointer;
    min-width: 100px;
  }
  .theme-option:active { transform: scale(0.95); }
  .theme-option.active {
    border-color: var(--pink);
    background: linear-gradient(135deg, #fce4ec, #f3e5f5);
    color: var(--pink-dark);
    box-shadow: 0 2px 10px rgba(233,30,99,0.15);
  }
  .theme-icon { font-size: 1.4rem; }
  .theme-name { font-size: 0.78rem; }
  .theme-previews { display: flex; gap: 2px; }
  .theme-preview-card { width: 22px; height: 26px; display: inline-block; }
  .theme-preview-card svg { width: 100%; height: 100%; }

  /* ‚îÄ‚îÄ‚îÄ Floating Background ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .bg-particles {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .bg-particle {
    position: absolute;
    opacity: 0;
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
    5% { opacity: var(--p-opacity, 0.18); }
    90% { opacity: var(--p-opacity, 0.18); }
    100% { transform: translateY(-10vh) translateX(var(--p-sway, 30px)) rotate(var(--p-rot, 360deg)); opacity: 0; }
  }
  .screen { position: relative; z-index: 1; }

  /* ‚îÄ‚îÄ‚îÄ Shimmer Title ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .menu-title {
    background: linear-gradient(90deg, #ad1457, #9c27b0, #e91e90, #ff6f61, #ffd54f, #e91e90, #9c27b0, #ad1457);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: titleShimmer 6s ease-in-out infinite;
  }
  @keyframes titleShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* ‚îÄ‚îÄ‚îÄ Card Back Pattern ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .card-back-pattern {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back-pattern svg { width: 70%; height: 70%; opacity: 0.35; }
  .card-back-shimmer { display: none; }

  /* ‚îÄ‚îÄ‚îÄ SVG Stars ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .svg-star { display: inline-block; vertical-align: middle; }
  .svg-star svg { width: 1em; height: 1em; vertical-align: -0.1em; }
  .star-rating .svg-star svg { width: 1em; height: 1em; }

  /* ‚îÄ‚îÄ‚îÄ Match Burst ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .match-particle {
    position: absolute; pointer-events: none; z-index: 10;
    animation: burstOut 0.65s ease-out forwards;
  }
  @keyframes burstOut {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--bx), var(--by)) scale(0); opacity: 0; }
  }
  .card.matched .card-front {
    box-shadow: 0 0 16px 4px rgba(255,213,79,0.5);
    transition: box-shadow 0.4s ease;
  }

  /* ‚îÄ‚îÄ‚îÄ Shooting Stars (win) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .shooting-star {
    position: fixed; z-index: 302; pointer-events: none;
    width: 4px; height: 4px; background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 6px 2px var(--gold), -20px 0 12px var(--gold), -40px 0 8px rgba(255,213,79,0.5);
    animation: shootStar 1.2s ease-in forwards;
  }
  @keyframes shootStar {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--sx, 400px), var(--sy, -300px)) scale(0.3); opacity: 0; }
  }

  /* ‚îÄ‚îÄ‚îÄ SVG Icon Buttons ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  .back-btn svg, .gear-btn svg, .hint-btn svg { width: 1.1em; height: 1.1em; vertical-align: -0.15em; }

  /* ‚îÄ‚îÄ‚îÄ Mobile Responsive ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  /* ‚îÄ‚îÄ‚îÄ Mobile Portrait ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  @media (max-width: 500px) {
    .difficulty { gap: 6px; }
    .diff-btn {
      padding: 10px 14px;
      font-size: 0.82rem;
      min-width: 0;
      flex: 0 0 auto;
      min-height: 44px;
    }
    .back-btn, .gear-btn { width: 44px; height: 44px; }
    .hint-btn { min-height: 44px; padding: 10px 16px; }
    .menu-settings-btn { min-height: 44px; padding: 12px 24px; }
    .grid.cols-4 {
      grid-template-columns: repeat(3, min(28vw, 130px));
      grid-auto-rows: min(37.33vw, 173px);
    }
    .grid.cols-5 {
      grid-template-columns: repeat(3, min(28vw, 130px));
      grid-auto-rows: min(37.33vw, 173px);
    }
    .grid.cols-6 {
      grid-template-columns: repeat(4, min(21vw, 115px));
      grid-auto-rows: min(28vw, 153px);
    }
    .game-header { gap: 6px; padding: 6px 4px; }
    .game-title { font-size: clamp(1rem, 3.5vw, 1.4rem); }
    .screen { padding: 14px 10px; padding-top: max(14px, env(safe-area-inset-top)); }
    .game-hud { padding: 4px 0; }
    .win-btn { padding: 12px 32px; font-size: 1.05rem; min-height: 44px; }
    .settings-panel { padding: 22px 24px; min-width: 240px; }
    .level-card { width: min(42vw, 180px); padding: 14px 10px 12px; }
  }

  /* ‚îÄ‚îÄ‚îÄ Landscape (short viewport) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  @media (max-height: 500px) {
    .menu-title { font-size: clamp(1.2rem, 3.5vw, 1.8rem); margin-bottom: 2px; }
    .menu-subtitle { font-size: 0.8rem; margin-bottom: 10px; }
    .total-stars-bar { margin-bottom: 10px; font-size: 0.85rem; }
    .level-cards { gap: 10px; margin-bottom: 14px; }
    .level-card { width: min(28vw, 160px); padding: 10px 8px 8px; }
    .level-card-icon svg { width: 48px; height: 48px; }
    .level-card-title { font-size: 0.85rem; }
    .screen { padding: 8px 12px; }
    .game-header { padding: 4px; margin-bottom: 0; border-radius: 0 0 10px 10px; }
    .game-title { font-size: clamp(0.9rem, 3vw, 1.2rem); }
    .difficulty { margin-bottom: 6px; gap: 6px; }
    .diff-btn { padding: 6px 14px; font-size: 0.8rem; }
    .game-hud { padding: 2px 0; margin-bottom: 4px; }
    .grid { gap: 6px; }
    .grid.cols-3 {
      grid-template-columns: repeat(3, min(20vh, 120px));
      grid-auto-rows: min(26.67vh, 160px);
    }
    .grid.cols-4, .grid.cols-5 {
      grid-template-columns: repeat(4, min(18vh, 100px));
      grid-auto-rows: min(24vh, 133px);
    }
    .grid.cols-6 {
      grid-template-columns: repeat(6, min(14vh, 85px));
      grid-auto-rows: min(18.67vh, 113px);
    }
    .win-overlay { padding: 10px; }
    .win-emoji svg { width: 50px; height: 50px; }
    .win-text { font-size: clamp(1.2rem, 5vw, 1.8rem); }
    .star-rating { margin: 6px 0 10px; gap: 6px; }
    .win-btn { padding: 10px 28px; font-size: 0.95rem; }
  }

  /* ‚îÄ‚îÄ‚îÄ Landscape + narrow (phone landscape) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
  @media (max-height: 500px) and (max-width: 900px) {
    .back-btn, .gear-btn { width: 38px; height: 38px; }
    .hint-btn { padding: 5px 12px; font-size: 0.78rem; }
    .grid.cols-3 {
      grid-template-columns: repeat(6, min(13vh, 90px));
      grid-auto-rows: min(17.33vh, 120px);
    }
    .grid.cols-4 {
      grid-template-columns: repeat(4, min(16vh, 95px));
      grid-auto-rows: min(21.33vh, 127px);
    }
    .grid.cols-5 {
      grid-template-columns: repeat(5, min(14vh, 85px));
      grid-auto-rows: min(18.67vh, 113px);
    }
    .grid.cols-6 {
      grid-template-columns: repeat(6, min(12vh, 75px));
      grid-auto-rows: min(16vh, 100px);
    }
  }
</style>
</head>
<body>

<!-- ‚ïê‚ïê‚ïê FLOATING BACKGROUND ‚ïê‚ïê‚ïê -->
<div class="bg-particles" id="bgParticles"></div>

<!-- ‚ïê‚ïê‚ïê MENU SCREEN ‚ïê‚ïê‚ïê -->
<div id="menuScreen" class="screen visible">
  <h1 class="menu-title">Maya's Game</h1>
  <p class="menu-subtitle">Choose your adventure!</p>
  <div class="total-stars-bar" id="totalStars"></div>
  <div class="level-cards">
    <div class="level-card" onclick="selectLevel(1)">
      <div class="level-card-icon"><svg viewBox="0 0 80 80" width="64" height="64"><polygon points="28,28 32,12 36,22 40,6 44,22 48,12 52,28" fill="#ffd54f" stroke="#f9a825" stroke-width="1.2"/><circle cx="40" cy="38" r="14" fill="#ffe0b2"/><circle cx="35" cy="36" r="2" fill="#5d4037"/><circle cx="45" cy="36" r="2" fill="#5d4037"/><path d="M37,42 Q40,46 43,42" stroke="#e91e63" fill="none" stroke-width="1.5" stroke-linecap="round"/><path d="M24,30 Q22,40 26,48" stroke="#f48fb1" fill="none" stroke-width="3" stroke-linecap="round"/><path d="M56,30 Q58,40 54,48" stroke="#f48fb1" fill="none" stroke-width="3" stroke-linecap="round"/><path d="M28,50 L24,74 40,66 56,74 52,50" fill="#ec407a"/><rect x="34" y="50" width="12" height="6" rx="2" fill="#ffd54f"/></svg></div>
      <div class="level-card-title">Pictures</div>
      <div class="level-card-stars" id="menu-stars-1"></div>
    </div>
    <div class="level-card" onclick="selectLevel(2)">
      <div class="level-card-icon"><svg viewBox="0 0 80 80" width="64" height="64"><rect x="12" y="14" width="56" height="50" rx="4" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/><line x1="40" y1="18" x2="40" y2="60" stroke="#e0c080" stroke-width="1.5"/><line x1="20" y1="26" x2="36" y2="26" stroke="#ce93d8" stroke-width="2" stroke-linecap="round"/><line x1="20" y1="33" x2="34" y2="33" stroke="#f48fb1" stroke-width="2" stroke-linecap="round"/><line x1="20" y1="40" x2="36" y2="40" stroke="#ce93d8" stroke-width="2" stroke-linecap="round"/><line x1="20" y1="47" x2="30" y2="47" stroke="#f48fb1" stroke-width="2" stroke-linecap="round"/><path d="M52,28 L56,24 L60,28 L56,32 Z" fill="#e91e63"/><circle cx="56" cy="42" r="5" fill="none" stroke="#ffd54f" stroke-width="2"/><polygon points="56,37 57.5,39.5 60,39.5 58,41 59,43.5 56,42 53,43.5 54,41 52,39.5 54.5,39.5" fill="#ffd54f"/></svg></div>
      <div class="level-card-title">Words</div>
      <div class="level-card-stars" id="menu-stars-2"></div>
    </div>
    <div class="level-card" onclick="selectLevel(3)">
      <div class="level-card-icon"><svg viewBox="0 0 80 80" width="64" height="64"><rect x="10" y="40" width="22" height="26" rx="4" fill="#f48fb1" stroke="#e91e63" stroke-width="1.5"/><rect x="29" y="28" width="22" height="38" rx="4" fill="#ce93d8" stroke="#9c27b0" stroke-width="1.5"/><rect x="48" y="16" width="22" height="50" rx="4" fill="#90caf9" stroke="#42a5f5" stroke-width="1.5"/><text x="21" y="58" text-anchor="middle" fill="white" font-weight="bold" font-size="14">1</text><text x="40" y="52" text-anchor="middle" fill="white" font-weight="bold" font-size="14">2</text><text x="59" y="46" text-anchor="middle" fill="white" font-weight="bold" font-size="14">3</text><polygon points="40,6 42,11 47,11 43,14 44.5,19 40,16 35.5,19 37,14 33,11 38,11" fill="#ffd54f"/></svg></div>
      <div class="level-card-title">Numbers</div>
      <div class="level-card-stars" id="menu-stars-3"></div>
    </div>
    <div class="level-card" onclick="selectLevel(4)">
      <div class="level-card-icon"><svg viewBox="0 0 80 80" width="64" height="64"><text x="14" y="38" fill="#e91e63" font-weight="bold" font-size="28" font-family="sans-serif">A</text><text x="42" y="38" fill="#7b1fa2" font-weight="bold" font-size="28" font-family="sans-serif">B</text><text x="22" y="66" fill="#1565c0" font-weight="bold" font-size="20" font-family="sans-serif">a</text><text x="46" y="66" fill="#e65100" font-weight="bold" font-size="20" font-family="sans-serif">b</text><polygon points="40,4 42,9 47,9 43,12 44.5,17 40,14 35.5,17 37,12 33,9 38,9" fill="#ffd54f"/></svg></div>
      <div class="level-card-title">Letters</div>
      <div class="level-card-stars" id="menu-stars-4"></div>
    </div>
  </div>
  <button class="menu-settings-btn" onclick="openSettings()"><svg viewBox="0 0 20 20" width="16" height="16" style="vertical-align:-2px;margin-right:4px"><circle cx="10" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M10,2 L10,5 M10,15 L10,18 M2,10 L5,10 M15,10 L18,10 M4.2,4.2 L6.3,6.3 M13.7,13.7 L15.8,15.8 M4.2,15.8 L6.3,13.7 M13.7,6.3 L15.8,4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Settings</button>
</div>

<!-- ‚ïê‚ïê‚ïê GAME SCREEN ‚ïê‚ïê‚ïê -->
<div id="gameScreen" class="screen hidden">
  <div class="game-header">
    <button class="back-btn" onclick="showMenu()"><svg viewBox="0 0 20 20" width="18" height="18"><path d="M13,4 L7,10 L13,16" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <h2 class="game-title" id="gameTitle">Pictures</h2>
    <button class="gear-btn" onclick="openSettings()"><svg viewBox="0 0 20 20" width="16" height="16"><circle cx="10" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M10,2 L10,5 M10,15 L10,18 M2,10 L5,10 M15,10 L18,10 M4.2,4.2 L6.3,6.3 M13.7,13.7 L15.8,15.8 M4.2,15.8 L6.3,13.7 M13.7,6.3 L15.8,4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
  </div>
  <div class="difficulty" id="difficultyBar">
    <button class="diff-btn active" data-level="easy" onclick="setDifficulty('easy')">Easy <span class="diff-stars" id="diff-stars-easy"></span></button>
    <button class="diff-btn" data-level="medium" onclick="setDifficulty('medium')">Medium <span class="diff-stars" id="diff-stars-medium"></span></button>
    <button class="diff-btn" data-level="hard" onclick="setDifficulty('hard')">Hard <span class="diff-stars" id="diff-stars-hard"></span></button>
  </div>
  <div class="game-hud">
    <div class="move-counter" id="moveCounter">Moves: 0</div>
    <div class="scroll-btns" id="scrollBtns">
      <button class="scroll-btn" onclick="scrollPage(-200)" aria-label="Scroll up">&#9650;</button>
      <button class="scroll-btn" onclick="scrollPage(200)" aria-label="Scroll down">&#9660;</button>
    </div>
    <button class="hint-btn" id="hintBtn" onclick="useHint()"><svg viewBox="0 0 20 20" width="14" height="14" style="vertical-align:-2px;margin-right:2px"><path d="M10,2 C6.5,2 4,4.8 4,8 C4,10.5 5.5,12 7,13 L7,15 L13,15 L13,13 C14.5,12 16,10.5 16,8 C16,4.8 13.5,2 10,2Z" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/><rect x="7" y="15.5" width="6" height="2" rx="1" fill="#f9a825"/><line x1="10" y1="6" x2="10" y2="10" stroke="#f57f17" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="5" r="1" fill="#f57f17"/></svg> Hint (3)</button>
  </div>
  <div class="grid cols-3" id="grid"></div>
</div>

<!-- ‚ïê‚ïê‚ïê WIN OVERLAY ‚ïê‚ïê‚ïê -->
<div class="win-overlay" id="winOverlay">
  <div class="win-emoji"><svg viewBox="0 0 100 100" width="80" height="80"><defs><linearGradient id="crownG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd54f"/><stop offset="100%" stop-color="#f9a825"/></linearGradient></defs><polygon points="30,55 35,25 42,42 50,18 58,42 65,25 70,55" fill="url(#crownG)" stroke="#e65100" stroke-width="1.5"/><rect x="30" y="55" width="40" height="8" rx="3" fill="url(#crownG)" stroke="#e65100" stroke-width="1"/><circle cx="50" cy="22" r="4" fill="#e91e63"/><circle cx="38" cy="30" r="3" fill="#7c4dff"/><circle cx="62" cy="30" r="3" fill="#00bcd4"/><polygon points="50,70 52,76 58,76 53,80 55,86 50,82 45,86 47,80 42,76 48,76" fill="#ffd54f"><animateTransform attributeName="transform" type="rotate" values="0 50 78;15 50 78;-15 50 78;0 50 78" dur="2s" repeatCount="indefinite"/></polygon><circle cx="25" cy="30" r="2.5" fill="#e91e63" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite"/></circle><circle cx="75" cy="35" r="2" fill="#ffd54f" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.8s" repeatCount="indefinite"/></circle><circle cx="20" cy="50" r="1.5" fill="#ce93d8" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.3s" repeatCount="indefinite"/></circle><circle cx="80" cy="48" r="2" fill="#42a5f5" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.6s" repeatCount="indefinite"/></circle><polygon points="22,18 23,21 26,21 23.5,23 24.5,26 22,24 19.5,26 20.5,23 18,21 21,21" fill="#ffd54f" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/></polygon><polygon points="78,20 79,23 82,23 79.5,25 80.5,28 78,26 75.5,28 76.5,25 74,23 77,23" fill="#f48fb1" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.7s" repeatCount="indefinite"/></polygon></svg></div>
  <div class="win-text" id="winText">You did it!</div>
  <div class="win-moves" id="winMoves"></div>
  <div class="star-rating" id="starRating"></div>
  <button class="win-btn" onclick="startGame()">Play Again</button>
  <button class="win-btn secondary" onclick="showMenu()">Menu</button>
</div>

<!-- ‚ïê‚ïê‚ïê SETTINGS ‚ïê‚ïê‚ïê -->

// SOUND ENGINE (Web Audio API)
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
const Sound = {
  ctx: null,
  enabled: true,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  play(freq, type, dur, vol = 0.2, delay = 0) {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start(t);
    osc.stop(t + dur + 0.05);
  },
  flip()      { this.play(800, 'sine', 0.07, 0.12); },
  match()     { this.play(523, 'triangle', 0.15, 0.2); this.play(659, 'triangle', 0.2, 0.2, 0.1); },
  mismatch()  { this.play(220, 'sine', 0.2, 0.1); this.play(210, 'sine', 0.2, 0.1); },
  win()       { [523,659,784,1047].forEach((f,i) => this.play(f, 'triangle', 0.3, 0.18, i*0.15)); },
  click()     { this.play(600, 'sine', 0.04, 0.08); },
  hint()      { this.play(1200,'sine',0.08,0.12); this.play(900,'sine',0.08,0.12,0.07); this.play(1100,'sine',0.12,0.08,0.14); },
  deal(i, n)  { this.play(400 + (i/n)*400, 'sine', 0.05, 0.06); }
};

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
const Storage = {
  KEY: 'princess-memory-v1',
  SKEY: 'princess-memory-settings',
  getProgress() { try { return JSON.parse(localStorage.getItem(this.KEY)) || {}; } catch { return {}; } },
  getStars(lvl, diff) { return (this.getProgress()[`${lvl}-${diff}`] || {}).stars || 0; },
  saveStars(lvl, diff, stars) {
    const p = this.getProgress();
    const k = `${lvl}-${diff}`;
    if (stars > ((p[k]||{}).stars||0)) { p[k] = { stars }; localStorage.setItem(this.KEY, JSON.stringify(p)); }
  },
  bestForLevel(lvl) { return Math.max(this.getStars(lvl,'easy'), this.getStars(lvl,'medium'), this.getStars(lvl,'hard')); },
  totalStars() { return Object.values(this.getProgress()).reduce((s,v) => s + (v.stars||0), 0); },
  maxStars() { return 36; }, // 4 levels √ó 3 difficulties √ó 3 stars
  getSettings() { try { return JSON.parse(localStorage.getItem(this.SKEY)) || { sound: true, theme: 'princess' }; } catch { return { sound: true, theme: 'princess' }; } },
  saveSettings(s) { localStorage.setItem(this.SKEY, JSON.stringify(s)); },
  reset() { localStorage.removeItem(this.KEY); }
};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function calcStars(moves, pairs) {
  // 3‚òÖ = near-perfect memory (at most 2 mistakes)
  // 2‚òÖ = good (roughly 50% extra moves)
  // 1‚òÖ = completed
  const perfect = pairs;  // perfect = every flip is a match
  if (moves <= perfect + 2) return 3;
  if (moves <= Math.ceil(perfect * 1.5) + 2) return 2;
  return 1;
}

function svgStar(filled, size) {
  const sz = size || 20;
  const fill = filled ? '#ffd54f' : '#e0e0e0';
  const stroke = filled ? '#f9a825' : '#bdbdbd';
  return `<span class="svg-star" style="width:${sz}px;height:${sz}px;display:inline-block"><svg viewBox="0 0 24 24" width="${sz}" height="${sz}"><defs><linearGradient id="sg${filled?1:0}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${filled?'#ffee58':fill}"/><stop offset="100%" stop-color="${fill}"/></linearGradient></defs><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9" fill="url(#sg${filled?1:0})" stroke="${stroke}" stroke-width="1.2" stroke-linejoin="round"/>${filled?'<polygon points="12,5 13.5,9.5 18,9.5 14.5,12.5 16,17 12,14" fill="rgba(255,255,255,0.3)"/>':''}</svg></span>`;
}
function renderStars(count, size) {
  const sz = size ? parseInt(size) || 20 : 20;
  let h = '';
  for (let i = 0; i < 3; i++) h += svgStar(i < count, sz);
  return h;
}

function toggleSound() {

  const s = Storage.getSettings();
  s.sound = Sound.enabled;
  Storage.saveSettings(s);
  if (Sound.enabled) Sound.click();

  const s = Storage.getSettings();

function renderThemePicker() {
  const picker = document.getElementById('themePicker');
  if (!picker) return;
  picker.innerHTML = '';
  Object.entries(themes).forEach(([key, theme]) => {
    const isActive = key === currentTheme;
    const btn = document.createElement('button');
    btn.className = `theme-option${isActive ? ' active' : ''}`;
    btn.onclick = () => selectTheme(key);
    const previews = theme.characters.slice(0, 3).map(c => {
      const miniSvg = c.svg.replace('viewBox="0 0 100 120"', 'viewBox="0 0 100 120" width="22" height="26"');
      return `<span class="theme-preview-card">${miniSvg}</span>`;
    }).join('');
    btn.innerHTML = `<span class="theme-icon">${theme.icon}</span><span class="theme-name">${theme.name}</span><span class="theme-previews">${previews}</span>`;
    picker.appendChild(btn);
  });
}

function selectTheme(key) {
  if (key === currentTheme) return;
  Sound.click();
  currentTheme = key;
  const s = Storage.getSettings();
  s.theme = key;
  Storage.saveSettings(s);
  renderThemePicker();
}

// DIFFICULTY
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function setDifficulty(d) {
  Sound.init(); Sound.click();
  currentDifficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.level === d));
  startGame();
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// EFFECTS
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function createSparkles(card) {
  const colors = ['#ffd54f','#f48fb1','#ce93d8','#80deea','#c5e1a5'];
  // Burst particles radiating outward
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2;
    const dist = 40 + Math.random() * 30;
    const bx = Math.cos(angle) * dist;
    const by = Math.sin(angle) * dist;
    const p = document.createElement('div');
    p.className = 'match-particle';
    const size = 4 + Math.random() * 6;
    const color = colors[i % 5];
    p.style.cssText = `left:50%;top:50%;width:${size}px;height:${size}px;background:${color};border-radius:50%;--bx:${bx}px;--by:${by}px;animation-delay:${Math.random()*0.1}s;margin-left:-${size/2}px;margin-top:-${size/2}px;`;
    card.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
  // Double ring pulse
  for (let r = 0; r < 2; r++) {
    const ring = document.createElement('div');
    ring.className = 'match-ring';
    ring.style.animationDelay = `${r * 0.15}s`;
    card.appendChild(ring);
    setTimeout(() => ring.remove(), 800);
  }
}

function launchConfetti() {
  const colors = ['#e91e63','#9c27b0','#ffd54f','#4caf50','#42a5f5','#ff9800','#f48fb1','#ce93d8'];
  const svgShapes = [
    (c) => `<svg width="14" height="14" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9" fill="${c}"/></svg>`,
    (c) => `<svg width="14" height="14" viewBox="0 0 24 24"><path d="M12,4 C12,4 4,10 4,15 C4,19 8,22 12,22 C16,22 20,19 20,15 C20,10 12,4 12,4Z" fill="${c}" transform="rotate(180 12 13)"/></svg>`,
    (c) => `<svg width="12" height="12" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="${c}"/></svg>`,
    (c) => `<svg width="14" height="14" viewBox="0 0 24 24"><polygon points="12,3 15,10 22,10 17,15 19,22 12,18 5,22 7,15 2,10 9,10" fill="${c}"/></svg>`,
  ];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const c = colors[Math.floor(Math.random() * 8)];
    p.innerHTML = svgShapes[Math.floor(Math.random() * 4)](c);
    const sz = 0.7 + Math.random() * 1.3;
    p.style.cssText = `left:${Math.random()*100}vw;font-size:1px;transform:scale(${sz});animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 6000);
  }
  // Shooting stars
  for (let i = 0; i < 5; i++) {
    const star = document.createElement('div');
    star.className = 'shooting-star';
    const startX = Math.random() * 60;
    const sx = 200 + Math.random() * 300;
    const sy = -(150 + Math.random() * 250);
    star.style.cssText = `left:${startX}%;top:${40+Math.random()*30}%;--sx:${sx}px;--sy:${sy}px;animation-delay:${0.2+i*0.3}s;`;
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 3000);
  }
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// HINT
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function useHint() {
  if (hintsRemaining <= 0 || locked) return;
  Sound.init(); Sound.hint();
  hintsRemaining--;
  updateHintBtn();
  locked = true;
  cards.forEach(c => { if (!c.matched) c.el.classList.add('flipped'); });
  setTimeout(() => {
    cards.forEach(c => {
      if (!c.matched) { c.flipped = false; c.el.classList.remove('flipped'); }
    });
    flippedCards = [];
    locked = false;
  }, 1500);
}

const hintSvg = '<svg viewBox="0 0 20 20" width="14" height="14" style="vertical-align:-2px;margin-right:2px"><path d="M10,2 C6.5,2 4,4.8 4,8 C4,10.5 5.5,12 7,13 L7,15 L13,15 L13,13 C14.5,12 16,10.5 16,8 C16,4.8 13.5,2 10,2Z" fill="#ffd54f" stroke="#f9a825" stroke-width="1"/><rect x="7" y="15.5" width="6" height="2" rx="1" fill="#f9a825"/><line x1="10" y1="6" x2="10" y2="10" stroke="#f57f17" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="5" r="1" fill="#f57f17"/></svg>';
function updateHintBtn() {
  const btn = document.getElementById('hintBtn');
  btn.innerHTML = `${hintSvg} Hint (${hintsRemaining})`;
  btn.disabled = hintsRemaining <= 0;
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// CARD FLIP
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function flipCard(index) {
  if (locked) return;
  Sound.init();
  const card = cards[index];
  if (!card || card.flipped || card.matched) return;

  Sound.flip();
  card.flipped = true;
  card.el.classList.add('flipped');
  flippedCards.push(index);

  if (flippedCards.length === 2) {
    moveCount++;
    document.getElementById('moveCounter').textContent = `Moves: ${moveCount}`;
    locked = true;
    const [a, b] = flippedCards;

    if (cards[a].charIndex === cards[b].charIndex) {
      Sound.match();
      cards[a].matched = true;
      cards[b].matched = true;
      matchedPairs++;
      setTimeout(() => {
        cards[a].el.classList.add('matched');
        cards[b].el.classList.add('matched');
        createSparkles(cards[a].el);
        createSparkles(cards[b].el);
      }, 300);
      flippedCards = [];
      locked = false;

      if (matchedPairs === totalPairs) {
        setTimeout(() => {
          const stars = calcStars(moveCount, totalPairs);
          Storage.saveStars(currentLevel, currentDifficulty, stars);
          showWin(stars);
          Sound.win();
          launchConfetti();
        }, 700);
      }
    } else {
      Sound.mismatch();
      setTimeout(() => {
        cards[a].flipped = false;
        cards[b].flipped = false;
        cards[a].el.classList.remove('flipped');
        cards[b].el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
      }, 850);
    }
  }
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// WIN SCREEN
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function showWin(stars) {
  const overlay = document.getElementById('winOverlay');
  overlay.classList.add('show');
  const winTitles3 = ['Amazing!', 'You did it!', 'Super star!', 'Wonderful!', 'Brilliant!'];
  const winTitles2 = ['Great job!', 'Well done!', 'You did it!', 'Awesome!'];
  const winTitles1 = ['You did it!', 'Good try!', 'Nice work!'];
  const titles = stars === 3 ? winTitles3 : stars === 2 ? winTitles2 : winTitles1;
  document.getElementById('winText').textContent = titles[Math.floor(Math.random() * titles.length)];
  const perfect = totalPairs;
  document.getElementById('winMoves').textContent = moveCount <= perfect
    ? `Perfect! ${moveCount} moves!`
    : `Done in ${moveCount} moves!`;
  const sr = document.getElementById('starRating');
  sr.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = document.createElement('span');
    s.className = `star ${i < stars ? 'reveal' : 'empty-star reveal'}`;
    s.innerHTML = svgStar(i < stars, 48);
    s.style.animationDelay = `${0.3 + i * 0.25}s`;
    sr.appendChild(s);
  }
  updateDifficultyStars();
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
// START GAME
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function startGame() {
  Sound.init();
  const config = difficultyConfig[currentLevel][currentDifficulty];
  const { pairs, cols } = config;
  totalPairs = pairs;
  matchedPairs = 0;
  flippedCards = [];
  locked = true;
  cards = [];
  moveCount = 0;
  hintsRemaining = 3;
  document.getElementById('moveCounter').textContent = 'Moves: 0';
  updateHintBtn();
  document.getElementById('winOverlay').classList.remove('show');

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = `grid cols-${cols}`;

  let deck;
  if (currentLevel === 1) {
    const chars = getCharacters();
    const sel = shuffle([...chars]).slice(0, pairs);
    deck = shuffle([...sel, ...sel].map(ch => ({ charIndex: chars.indexOf(ch), content: ch })));
  } else if (currentLevel === 4) {
    const sel = shuffle([...letters]).slice(0, pairs);
    const upperCards = sel.map(l => ({ charIndex: letters.indexOf(l), content: { name: l.upper, color: l.color, bg: l.bg } }));
    const lowerCards = sel.map(l => ({ charIndex: letters.indexOf(l), content: { name: l.lower, color: l.color, bg: l.bg } }));
    deck = shuffle([...upperCards, ...lowerCards]);
  } else {
    const source = currentLevel === 2 ? words : numbers;
    const sel = shuffle([...source]).slice(0, pairs);
    deck = shuffle([...sel, ...sel].map(w => ({ charIndex: source.indexOf(w), content: w })));
  }

  deck.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card dealing';
    card.onclick = () => flipCard(i);

    let front;
    if (currentLevel === 1) {
      front = `${item.content.svg}<div class="card-label">${item.content.name}</div>`;
    } else {
      const w = item.content;
      const fs = w.name.length <= 2 ? 'clamp(1.8rem,5vw,2.6rem)' :
                 w.name.length <= 3 ? 'clamp(1.4rem,4.5vw,2.2rem)' :
                 w.name.length <= 4 ? 'clamp(1.1rem,3.5vw,1.8rem)' :
                                      'clamp(0.9rem,3vw,1.4rem)';
      front = `<div class="word-text" style="color:${w.color};font-size:${fs}">${w.name}</div>`;
    }

    const bgStyle = currentLevel !== 1 ? `style="background:${item.content.bg}"` : '';
    const theme = themes[currentTheme] || themes.princess;
    const isThemed = currentLevel === 1;
    const cardBackPattern = isThemed ? theme.cardBack : themes.princess.cardBack;
    const cardGradient = isThemed ? theme.cardBackGradient : '';
    const cardBorder = isThemed && currentTheme === 'animals' ? '#81c784' : '';
    const cardStyle = (cardGradient || cardBorder) ? `style="${cardGradient ? '--card-bg:' + cardGradient + ';' : ''}${cardBorder ? '--card-border:' + cardBorder + ';' : ''}"` : '';
    card.innerHTML = `
      <div class="card-face card-back" ${cardStyle}><div class="card-back-pattern">${cardBackPattern}</div><div class="card-back-shimmer"></div></div>
      <div class="card-face card-front" ${bgStyle}>${front}</div>
    `;

    grid.appendChild(card);
    cards.push({ el: card, charIndex: item.charIndex, flipped: false, matched: false });
  });

  // Deal animation
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      cards.forEach((c, i) => {
        setTimeout(() => {
          c.el.classList.remove('dealing');
          c.el.classList.add('dealt');
          Sound.deal(i, cards.length);
        }, i * 50);
      });
      setTimeout(() => {
        locked = false;
        cards.forEach(c => c.el.classList.remove('dealt'));
      }, cards.length * 50 + 400);
    });
  });
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  const colors = ['#f48fb1','#ce93d8','#ffd54f','#90caf9','#80cbc4','#ffab91','#b39ddb'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'bg-particle';
    const size = 15 + Math.random() * 28;
    const color = colors[Math.floor(Math.random() * colors.length)];

    const duration = 18 + Math.random() * 18;
    const sway = -40 + Math.random() * 80;
    const rot = Math.random() > 0.5 ? 360 : -360;
    p.innerHTML = shapes[Math.floor(Math.random() * shapes.length)](color);
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;--p-opacity:${opacity};--p-sway:${sway}px;--p-rot:${rot}deg;animation-duration:${duration}s;animation-delay:${-Math.random()*duration}s;`;
    container.appendChild(p);
  }
}

window.addEventListener('resize', setVH);

document.addEventListener('touchmove', function(e) {

}, { passive: false });

function scrollPage(amount) {
  window.scrollTo(0, Math.max(0, window.scrollY + amount));
}
